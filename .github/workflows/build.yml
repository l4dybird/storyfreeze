name: Unit test

on:
  push:
    branches:
      - master
      - next
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        node-version: [20.19.0]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn bootstrap
      - run: yarn baseline:verify
      - run: yarn build
      - run: yarn test
        env:
          CI: true
      - run: yarn package:smoke
      - name: Verify alpha publish metadata
        run: |
          test "$(node -p "require('./lerna.json').version")" = "0.1.0-alpha.0"
          test "$(node -p "require('./packages/storyfreeze/package.json').version")" = "0.1.0-alpha.0"
          test "$(node scripts/get-dist-tag.js)" = "next"
      - run: yarn publish:dry-run
