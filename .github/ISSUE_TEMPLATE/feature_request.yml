name: Feature request
description: Propose an improvement to StoryFreeze
title: '[Feature]: '
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and public API, if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility
      options:
        - label: I have considered compatibility with existing ScreenshotOptions and output paths.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for existing issues and roadmap items.
          required: true
