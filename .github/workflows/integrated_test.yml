name: Integrated Test

on:
  push:
    branches:
      - master
      - next
  pull_request:

jobs:
  react-vite-preview-protocol:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: examples/react-vite/package-lock.json
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn bootstrap
      - run: yarn build
      - run: npm ci
        working-directory: examples/react-vite
      - run: npm run test:storybook10-e2e
        working-directory: examples/react-vite
