packages:
  - "packages/*"
  - "examples/*"

minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeExclude: []
trustLockfile: false

overrides:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vitest: 4.1.10

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

allowBuilds:
  esbuild: true
  puppeteer: true
