name: Unit test

on:
  push:
    branches:
      - master
      - next
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        node-version: [22.18.0, 24.11.0]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: true
          cache-dependency-path: pnpm-lock.yaml
          run-install: false
      - uses: pnpm/action-setup@v6
      - run: vp install --frozen-lockfile
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-node-${{ matrix.node-version }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-node-${{ matrix.node-version }}-
      - run: pnpm baseline:verify
      - run: pnpm format:check
        if: matrix.node-version == '22.18.0'
      - run: pnpm lint
        if: matrix.node-version == '22.18.0'
      - run: pnpm build
      - run: pnpm test
        env:
          CI: true
      - run: pnpm package:smoke
        if: matrix.node-version == '22.18.0'
      - name: Verify alpha publish metadata
        if: matrix.node-version == '22.18.0'
        run: |
          node -e "const { version } = require('./packages/storyfreeze/package.json'); if (!/^\\d+\\.\\d+\\.\\d+-alpha\\.\\d+$/.test(version)) throw new Error('Expected an alpha version, got ' + version)"
          test "$(node scripts/get-dist-tag.js)" = "next"
      - run: pnpm publish:dry-run
        if: matrix.node-version == '22.18.0'
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 22.18.0
          cache: true
          cache-dependency-path: pnpm-lock.yaml
          run-install: false
      - uses: pnpm/action-setup@v6
      - run: vp install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          CI: true
      - run: pnpm package:smoke
      - name: Verify generated and locked files are unchanged
        run: git diff --exit-code
